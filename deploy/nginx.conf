server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /sw.js {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location ~* ^/workbox-[0-9a-f]+\.js$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  location ~* ^/(assets|480M_pieces_float16|480L_xcorners_float16|tfjs-wasm)/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|json|bin|wasm|webmanifest)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
