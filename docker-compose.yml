services:
  chesscam:
    build:
      context: .
      args:
        VITE_LICHESS_CLIENT_ID: ${VITE_LICHESS_CLIENT_ID:-camera-chess-self-hosted}
        VITE_LICHESS_HOST: ${VITE_LICHESS_HOST:-https://lichess.org}
    image: camera-chess-web:local
    restart: unless-stopped
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-8001}:80"
